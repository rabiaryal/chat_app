name: chat_app
description: A production-ready chat application with Django backend and Flutter frontend.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP and JSON
  http: ^1.1.0
  dio: ^5.3.0
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  
  # WebSocket
  web_socket_channel: ^2.4.0
  # Connectivity detection
  connectivity_plus: ^4.0.0
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # State Management
  provider: ^6.0.0
  equatable: ^2.0.5
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # JWT Decoding
  dart_jsonwebtoken: ^2.12.0
  
  # UI
  intl: ^0.18.1
  flutter_screenutil: ^5.9.3
  
  # Navigation
  go_router: ^10.0.0
  
  # Async
  async: ^2.11.0
  fpdart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Testing
  mockito: ^5.4.0
  test: ^1.24.0
  
  # Launcher Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
