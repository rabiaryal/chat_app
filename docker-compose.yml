services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chat_app_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-chat_user}
      POSTGRES_USER: ${DB_USER:-chat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chat_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chat_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chat_app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat_network

  # Django Backend
  django:
    build:
      context: ./backend_core
      dockerfile: Dockerfile
    container_name: chat_app_django
    command: >
      sh -c "python chat_project/manage.py migrate &&
             python chat_project/manage.py collectstatic --noinput &&
             python chat_project/manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DB_NAME=${DB_NAME:-chat_db}
      - DB_USER=${DB_USER:-chat_user}
      - DB_PASSWORD=${DB_PASSWORD:-chat_password}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - ./backend_core:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; response = urllib.request.urlopen('http://localhost:8000/'); exit(0 if response.status == 200 or response.status == 404 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Service
  fastapi:
    build:
      context: ./fastapi_chat
      dockerfile: Dockerfile
    container_name: chat_app_fastapi
    environment:
      - FASTAPI_DEBUG=${FASTAPI_DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - DATABASE_URL=${DATABASE_URL}
      - DB_NAME=${DB_NAME:-chat_db}
      - DB_USER=${DB_USER:-chat_user}
      - DB_PASSWORD=${DB_PASSWORD:-chat_password}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DJANGO_SERVICE_URL=http://django:8000
    ports:
      - "${FASTAPI_PORT:-8081}:8081"
    volumes:
      - ./fastapi_chat:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:

networks:
  chat_network:
    driver: bridge
